server {
    listen 80;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /momo-store/ {
        alias /usr/share/nginx/html/;

        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;

    location /api/ {
        proxy_pass http://backend:8081/;
    }

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
