services:
  backend:
    image: iezekiil/docker-sec-backend-dev:a8778b7 
    volumes:
      - backend_data:/app/data
    
    expose:
      - "8081"
    networks:
      - backend_net
      - internal_net

    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  frontend:
    image: iezekiil/docker-sec-frontend-dev:a8778b7
    volumes:
      - frontend_data:/usr/share/nginx/html/uploads
    
    ports:
      - 80:80
    networks:
      - frontend_net
      - backend_net

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:80/momo-store/catalog"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    container_name: docker-sec-prometheus
    restart: unless-stopped
    volumes:
      - ./dockerSecPrometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - backend_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: docker-sec-cadvisor
    restart: unless-stopped
    ports:
      - "8085:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - backend_net



networks:
  frontend_net:
  backend_net:
  internal_net:
    internal: true

volumes:
  backend_data:
  frontend_data:
  prometheus_data: